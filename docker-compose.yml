services:
  postgres:
    image: postgres:16-alpine
    container_name: ezcms-postgres
    environment:
      POSTGRES_USER: ezcms
      POSTGRES_PASSWORD: ezcms
      POSTGRES_DB: ezcms
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ezcms -d ezcms"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: ezcms-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done &&
      mc mb --ignore-existing local/ezcms-local &&
      mc anonymous set download local/ezcms-local
      "

volumes:
  postgres_data:
  minio_data:
